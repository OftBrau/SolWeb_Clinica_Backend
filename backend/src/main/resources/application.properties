# ============================================================
#  CLINICA UPN - BACKEND
#  src/main/resources/application.properties
# ============================================================

# --- Servidor ---
server.port=8080

# --- Base de Datos MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/db_clinica_upn?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=Brau
spring.datasource.password=Root1234!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Pool de conexiones (HikariCP - viene por defecto en Spring Boot) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# --- Sin JPA (usamos JDBC puro) ---
spring.jpa.enabled=false

# --- JWT ---
jwt.secret=clinica-upn-secret-key-2024-muy-larga-para-seguridad
jwt.expiration=86400000

# --- CORS (origen de Angular) ---
cors.allowed-origin=http://localhost:4200

# --- Logs (ver queries SQL en consola durante desarrollo) ---
logging.level.root=INFO
logging.level.clinica.upn=DEBUG