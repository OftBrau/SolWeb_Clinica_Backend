# ============================================================
#  CLINICA UPN - BACKEND
#  src/main/resources/application.properties
# ============================================================

# --- Cargar variables de entorno desde .env ---
spring.config.import=optional:file:.env

# --- Servidor ---
server.port=${SERVER_PORT:8080}

# --- Base de Datos MySQL ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/db_clinica_upn?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Pool de conexiones (HikariCP - viene por defecto en Spring Boot) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# --- JPA / Hibernate (scheduling module) ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Inicialización SQL (solo schema.sql legacy, sin scheduling) ---
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql

# --- JWT ---
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# --- Multipart (subida de fotos) ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- CORS (origen de Angular) ---
cors.allowed-origin=http://localhost:4200

# --- Huso horario (América/Lima) ---
spring.jackson.time-zone=America/Lima

# --- Logs (ver queries SQL en consola durante desarrollo) ---
logging.level.root=INFO
logging.level.clinica.upn=DEBUG


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

